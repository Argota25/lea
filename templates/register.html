{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="auth-page">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Start owning the music you love.</p>
    
    <form action="{{ url_for('register') }}" method="post" class="auth-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
            <p class="form-hint">At least 8 characters</p>
        </div>
        <div class="form-group">
            <label for="confirmation">Confirm password</label>
            <input type="password" id="confirmation" name="confirmation" autocomplete="new-password" minlength="8" required>
        </div>
        <button type="submit" class="auth-button">Create account</button>
    </form>
    
    <p class="auth-switch">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
</section>
{% endblock %}
